<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AfriDam | Skin Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,800;1,800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #white; }
        .font-black-italic { font-weight: 800; font-style: italic; }
        .scanner-line {
            height: 2px;
            background: #E1784F;
            box-shadow: 0 0 20px 5px #E1784F;
            animation: scan 3s infinite ease-in-out;
            position: absolute;
            width: 100%;
            z-index: 20;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div id="step-1" class="w-full max-w-md text-center space-y-8">
        <h1 class="text-5xl font-black-italic tracking-tighter">
            Scan Your <span class="text-[#E1784F]">Skin.</span>
        </h1>
        
        <div class="flex items-start gap-3 bg-slate-50 p-4 rounded-2xl text-left">
            <input type="checkbox" id="terms" class="mt-1 w-5 h-5 accent-[#E1784F] cursor-pointer">
            <label for="terms" class="text-[11px] font-bold opacity-60 leading-tight uppercase tracking-wider">
                I agree to the clinical terms and allow AfriDam AI to process my image for analysis and medical annotation.
            </label>
        </div>

        <button onclick="checkConsent()" class="w-full h-20 bg-black text-white rounded-2xl font-black italic text-[14px] tracking-widest shadow-2xl active:scale-95 transition-all">
            START CAMERA
        </button>
    </div>

    <div id="step-2" class="hidden relative w-full max-w-sm aspect-[4/5] bg-black rounded-[3rem] overflow-hidden border-[10px] border-white shadow-2xl">
        <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
        <div class="scanner-line"></div>
        <div class="absolute bottom-8 w-full flex justify-center">
            <button onclick="takePhoto()" class="w-20 h-20 bg-white rounded-full border-[6px] border-slate-200 shadow-2xl active:scale-90 transition-all"></button>
        </div>
        <canvas id="canvas" class="hidden"></canvas>
    </div>

    <div id="step-3" class="hidden text-center space-y-6">
        <div class="w-16 h-16 border-4 border-[#4DB6AC] border-t-transparent rounded-full animate-spin mx-auto"></div>
        <h2 id="status" class="text-2xl font-black-italic italic">Analyzing...</h2>
    </div>

    <div id="step-4" class="hidden text-center space-y-8">
        <h2 class="text-4xl font-black-italic italic">Analysis Ready.</h2>
        <button onclick="goToRegister()" class="w-full max-w-sm h-20 bg-[#E1784F] text-white rounded-2xl font-black italic tracking-widest shadow-xl active:scale-95 transition-all">
            VIEW RESULTS
        </button>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        function checkConsent() {
            if (document.getElementById('terms').checked) {
                startCamera();
            } else {
                alert("Please agree to the clinical terms to proceed.");
            }
        }

        async function startCamera() {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
        }

        async function takePhoto() {
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.remove('hidden');

            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.9));
            
            // Send to Tobi's Backend (Update the URL once Tobi confirms)
            const formData = new FormData();
            formData.append('image', blob); // This matches the 'image' key we discussed

            fetch('https://api.afridamai.com/api/v2/skin-diagnosis', {
                method: 'POST',
                body: formData
            }).then(() => {
                console.log("Data Sent");
                setTimeout(() => {
                    document.getElementById('step-3').classList.add('hidden');
                    document.getElementById('step-4').classList.remove('hidden');
                }, 2000);
            }).catch(() => {
                // Still show results button even if upload fails
                document.getElementById('step-3').classList.add('hidden');
                document.getElementById('step-4').classList.remove('hidden');
            });
        }

        function goToRegister() {
            window.location.href = "https://app.afridamai.com/register";
        }
    </script>
</body>
</html>
